<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEPSE PRO | LIVE MARKET PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg: #050608;
            --card: #0d1117;
            --accent: #2f81f7;
            --success: #3fb950;
            --danger: #f85149;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
        }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); }
        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 1rem;
        }
        .content {
            padding: 2rem;
            overflow-y: auto;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 1rem;
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-weight: 400;
        }
        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .symbol {
            background: #161b22;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: 0.2s;
        }
        .symbol:hover { background: var(--accent); color: white; }
        .price { font-family: 'JetBrains Mono', monospace; }
        .positive { color: var(--success); }
        .negative { color: var(--danger); }
        .search-box {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin-bottom: 1.5rem;
            outline: none;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .mini-stat {
            background: var(--bg);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .mini-stat label { font-size: 0.6rem; display: block; color: var(--text-dim); }
        .mini-stat span { font-weight: bold; font-size: 0.9rem; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: var(--card);
            width: 90%;
            max-width: 1000px;
            margin: 5vh auto;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close { color: var(--text-dim); cursor: pointer; font-size: 24px; }
        .close:hover { color: white; }
    </style>
</head>
<body>
    <header>
        <div class="logo">NEPSE PRO TERMINAL</div>
        <div id="market-status" style="font-size: 0.8rem; color: var(--success);">● LIVE DATA STREAMING</div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <span class="section-title">Market Summary</span>
            <div class="card">
                <div style="font-size: 2rem; font-weight: bold;" id="index-val">0.00</div>
                <div id="index-chg" style="margin-top: 5px;">0.00 (0.00%)</div>
            </div>

            <div class="stat-grid">
                <div class="mini-stat">
                    <label>TURNOVER</label>
                    <span id="turnover">Rs. 0</span>
                </div>
                <div class="mini-stat">
                    <label>SCRIPTS</label>
                    <span id="scripts">0</span>
                </div>
            </div>

            <span class="section-title" style="margin-top: 2rem;">Sector Performance</span>
            <div id="sectors-container"></div>
        </div>

        <div class="content">
            <input type="text" id="search" class="search-box" placeholder="Search by symbol or company name...">
            
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>SYMBOL</th>
                            <th>LTP</th>
                            <th>CHANGE</th>
                            <th>% CHG</th>
                            <th>VOLUME</th>
                        </tr>
                    </thead>
                    <tbody id="market-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Chart Modal -->
    <div id="chart-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="chart-title" style="margin:0">CHART</h2>
                <span class="close" id="close-modal">&times;</span>
            </div>
            <div id="chart-container" style="height: 500px;"></div>
        </div>
    </div>

    <script>
        const API_KEY = '5955e15b-fdc2-450b-9171-4752bb933124';
        const BASE_URL = 'https://market-stock-1n2m.onrender.com';
        
        let allData = [];

        async function updateMarket() {
            try {
                const [mRes, sRes] = await Promise.all([
                    fetch(`${BASE_URL}/api/v1/market?api_key=${API_KEY}`),
                    fetch(`${BASE_URL}/api/v1/sectors?api_key=${API_KEY}`)
                ]);

                const mData = await mRes.json();
                const sData = await sRes.json();

                if (mData.status === 'success') {
                    allData = mData.prices;
                    renderMarket(allData);
                    renderSummary(mData.summary);
                }
                if (sData.status === 'success') {
                    renderSectors(sData.sectors);
                }
            } catch (e) {
                console.error("Fetch failed", e);
            }
        }

        function renderSummary(s) {
            document.getElementById('index-val').textContent = s.index_value.toLocaleString();
            const isPos = s.change >= 0;
            document.getElementById('index-chg').innerHTML = `<span class="${isPos ? 'positive' : 'negative'}">${isPos ? '▲' : '▼'} ${Math.abs(s.change)} (${s.percent_change}%)</span>`;
            document.getElementById('turnover').textContent = (s.total_turnover / 10000000).toFixed(2) + ' Cr';
            document.getElementById('scripts').textContent = s.total_scripts;
        }

        function renderSectors(sectors) {
            const container = document.getElementById('sectors-container');
            container.innerHTML = sectors.map(s => {
                const isPos = s.change >= 0;
                return `
                    <div class="market-item" style="display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem;">
                        <span>${s.sector}</span>
                        <span class="${isPos ? 'positive' : 'negative'}">${isPos ? '+' : ''}${s.percent_change}%</span>
                    </div>
                `;
            }).join('');
        }

        function renderMarket(data) {
            const tbody = document.getElementById('market-tbody');
            tbody.innerHTML = data.map(p => {
                const isPos = p.change >= 0;
                return `
                    <tr>
                        <td><span class="symbol" onclick="openChart('${p.symbol}')">${p.symbol}</span></td>
                        <td class="price">${p.price.toLocaleString()}</td>
                        <td class="${isPos ? 'positive' : 'negative'}">${isPos ? '+' : ''}${p.change}</td>
                        <td class="${isPos ? 'positive' : 'negative'}">${isPos ? '+' : ''}${p.percent_change}%</td>
                        <td class="price">${p.volume.toLocaleString()}</td>
                    </tr>
                `;
            }).join('');
        }

        // --- CHART LOGIC ---
        async function openChart(symbol) {
            document.getElementById('chart-modal').style.display = 'block';
            document.getElementById('chart-title').textContent = `${symbol} Technical Chart`;
            const container = document.getElementById('chart-container');
            container.innerHTML = '<div style="padding: 20px; color: var(--text-dim);">Loading technical data...</div>';

            try {
                const res = await fetch(`${BASE_URL}/api/history/${symbol}`);
                const data = await res.json();
                if (data && data.length > 0) {
                    renderTechnicalChart(data);
                } else {
                    container.innerHTML = '<div style="padding: 20px;">No historical data available for this symbol.</div>';
                }
            } catch (e) {
                container.innerHTML = '<div style="padding: 20px;">Failed to load chart data.</div>';
            }
        }

        function renderTechnicalChart(data) {
            const container = document.getElementById('chart-container');
            container.innerHTML = '';
            
            const chart = LightweightCharts.createChart(container, {
                layout: {
                    background: { color: '#0d1117' },
                    textColor: '#8b949e',
                },
                grid: {
                    vertLines: { color: '#161b22' },
                    horzLines: { color: '#161b22' },
                },
                timeScale: {
                    borderColor: '#30363d',
                },
            });

            const candleSeries = chart.addCandlestickSeries({
                upColor: '#3fb950',
                downColor: '#f85149',
                borderVisible: false,
                wickUpColor: '#3fb950',
                wickDownColor: '#f85149',
            });

            candleSeries.setData(data.map(d => ({
                time: d.time,
                open: d.open,
                high: d.high,
                low: d.low,
                close: d.close
            })));

            chart.timeScale().fitContent();
        }

        document.getElementById('close-modal').onclick = () => {
            document.getElementById('chart-modal').style.display = 'none';
        };

        window.onclick = (event) => {
            if (event.target == document.getElementById('chart-modal')) {
                document.getElementById('chart-modal').style.display = 'none';
            }
        };

        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allData.filter(d => d.symbol.toLowerCase().includes(term) || (d.name && d.name.toLowerCase().includes(term)));
            renderMarket(filtered);
        });

        updateMarket();
        setInterval(updateMarket, 10000);
    </script>
</body>
</html>
