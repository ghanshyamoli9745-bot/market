<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEPSE LIVE WIDGET</title>
    <style>
        :root {
            --bg: #050608;
            --accent: #2f81f7;
            --text: #e6edf3;
            --success: #3fb950;
            --danger: #f85149;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 300px;
        }
        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        .widget-header h3 {
            font-size: 0.8rem;
            margin: 0;
            letter-spacing: 1px;
            color: var(--accent);
        }
        .market-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .symbol { font-weight: bold; }
        .price { font-family: monospace; }
        .change { font-size: 0.75rem; }
        .positive { color: var(--success); }
        .negative { color: var(--danger); }
        .footer {
            margin-top: 10px;
            font-size: 0.6rem;
            color: #8b949e;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="widget-header">
        <h3>LIVE MARKET</h3>
        <span id="status" style="font-size: 0.6rem; opacity: 0.5;">SYNCING...</span>
    </div>
    <div id="prices-container">
        <!-- Prices will load here -->
    </div>
    <div class="footer">
        Powered by NEPSE PRO • Key: 22afcc...
    </div>

    <script>
        const API_KEY = '22afcc08-c105-493a-8982-02372ce9587f';
        const API_URL = '/api/external/market-data?api_key=' + API_KEY;

        async function fetchMarket() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.status === 'success' || data.prices) {
                    const prices = data.live_prices || data.prices;
                    renderPrices(prices.slice(0, 5));
                    document.getElementById('status').textContent = 'LIVE';
                } else {
                    document.getElementById('status').textContent = 'AUTH ERROR';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('status').textContent = 'OFFLINE';
            }
        }

        function renderPrices(prices) {
            const container = document.getElementById('prices-container');
            container.innerHTML = prices.map(p => {
                const isPos = p.change >= 0;
                return `
                    <div class="market-item">
                        <span class="symbol">${p.symbol}</span>
                        <span class="price">${p.price}</span>
                        <span class="change ${isPos ? 'positive' : 'negative'}">
                            ${isPos ? '▲' : '▼'} ${Math.abs(p.percent_change)}%
                        </span>
                    </div>
                `;
            }).join('');
        }

        fetchMarket();
        setInterval(fetchMarket, 10000); // Update every 10 seconds
    </script>
</body>
</html>
